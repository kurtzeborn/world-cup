name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy_infra:
    runs-on: ubuntu-latest
    name: Deploy Bicep
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: rg-world-cup
          template: infra/main.bicep
          parameters: infra/main.bicepparam
          failOnStdErr: false

      - name: Restore auth app settings
        # Bicep appsettings resource does a full PUT and wipes any settings not
        # declared in the template. Re-apply secrets from GitHub Secrets here.
        run: |
          az staticwebapp appsettings set \
            --name swa-wc-prod \
            --resource-group rg-world-cup \
            --setting-names \
              GOOGLE_CLIENT_ID="${{ secrets.SWA_GOOGLE_CLIENT_ID }}" \
              GOOGLE_CLIENT_SECRET="${{ secrets.SWA_GOOGLE_CLIENT_SECRET }}" \
              AZURE_CLIENT_ID="${{ secrets.SWA_ENTRA_CLIENT_ID }}" \
              AZURE_CLIENT_SECRET="${{ secrets.SWA_ENTRA_CLIENT_SECRET }}" \
              ADMIN_EMAILS="${{ secrets.SWA_ADMIN_EMAILS }}"
